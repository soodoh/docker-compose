model_list:
  - model_name: "openrouter/z-ai/glm-5.2"
    model_info:
      mode: responses
      max_input_tokens: 1048576
      max_output_tokens: 131072
      max_tokens: 131072
      supports_reasoning: true
      supports_function_calling: true
      supports_parallel_function_calling: true
      supports_response_schema: true
      supports_vision: false
      supported_endpoints:
        - /v1/responses
    litellm_params:
      model: openrouter/z-ai/glm-5.2
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: chatgpt/gpt-5.6-sol
    model_info: &chatgpt-5-6-info
      mode: responses
      max_input_tokens: 372000
      max_output_tokens: 128000
      max_tokens: 128000
      supports_reasoning: true
      supports_function_calling: true
      supports_parallel_function_calling: true
      supports_response_schema: true
      supports_vision: true
      supported_endpoints:
        - /v1/responses
        - /v1/chat/completions
    litellm_params:
      model: chatgpt/gpt-5.6-sol
  - model_name: chatgpt/gpt-5.6-terra
    model_info:
      <<: *chatgpt-5-6-info
    litellm_params:
      model: chatgpt/gpt-5.6-terra
  - model_name: chatgpt/gpt-5.6-luna
    model_info:
      <<: *chatgpt-5-6-info
    litellm_params:
      model: chatgpt/gpt-5.6-luna

litellm_settings:
  check_provider_endpoint: true
  callbacks:
    - custom_callbacks.service_tier_passthrough

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
