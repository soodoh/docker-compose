services:
  openfit:
    image: ghcr.io/soodoh/openfit:latest
    container_name: openfit
    restart: unless-stopped
    volumes:
      - openfit-data:/app/data
    environment:
      TZ: $TZ
      BETTER_AUTH_BASE_URL: $BETTER_AUTH_BASE_URL
      BETTER_AUTH_SECRET: $BETTER_AUTH_SECRET
      ADMIN_USER: $ADMIN_USER
      ADMIN_PASSWORD: $ADMIN_PASSWORD
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - proxy

volumes:
  openfit-data:
