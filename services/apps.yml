x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: 3

services:
  jellyfin:
    image: ghcr.io/jellyfin/jellyfin:10.11.6
    container_name: jellyfin
    restart: unless-stopped
    logging: *default-logging
    labels:
      docker-volume-backup.stop-during-backup: true
    ports:
      - 8096:8096
    volumes:
      - type: volume
        source: jellyfin-data
        target: /config
        volume:
          subpath: config
      - type: volume
        source: jellyfin-data
        target: /cache
        volume:
          subpath: cache
      - ${MEDIA_PATH}/tv_shows:/tv_shows
      - ${MEDIA_PATH}/movies:/movies
      - ${MEDIA_PATH}/anime:/anime
      - ${MEDIA_PATH}/books:/books
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card1:/dev/dri/card1
    environment:
      TZ: $TZ
      PUID: 1000
      PGID: 1000
      LIBVA_DRIVER_NAME: radeonsi
      JELLYFIN_SERVERS: $INTERNAL_HOST_IP
      JELLYFIN_PublishedServerUrl: $JELLYFIN_PublishedServerUrl
    networks:
      - proxy

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.32.1
    container_name: audiobookshelf
    restart: unless-stopped
    logging: *default-logging
    labels:
      docker-volume-backup.stop-during-backup: true
    environment:
      TZ: $TZ
    volumes:
      - ${MEDIA_PATH}/books:/books
      - type: volume
        source: audiobookshelf-data
        target: /config
        volume:
          subpath: config
      - type: volume
        source: audiobookshelf-data
        target: /metadata
        volume:
          subpath: metadata
    networks:
      - proxy

  calibre:
    image: ghcr.io/linuxserver/calibre:9.2.1
    container_name: calibre
    restart: unless-stopped
    logging: *default-logging
    environment:
      TZ: $TZ
      PUID: 1000
      PGID: 1000
    labels:
      docker-volume-backup.stop-during-backup: true
    volumes:
      - type: volume
        source: calibre-data
        target: /config
        volume:
          subpath: config
      - type: volume
        source: calibre-data
        target: /plugins
        volume:
          subpath: plugins
      - type: volume
        source: calibre-data
        target: /books
        volume:
          subpath: books
      - ${MEDIA_PATH}/downloads:/downloads
    networks:
      proxy:
        ipv4_address: 172.23.0.99

  calibre-web-automated:
    # image: ghcr.io/crocodilestick/calibre-web-automated:V3.1.4
    # Using specific SHA for new OIDC feature until next release
    image: ghcr.io/crocodilestick/calibre-web-automated@sha256:3b6b7b9a2ff8f7bd5edcf126196cdc41d92d4f3528fdc16253a09e17c429a7ff
    container_name: calibre-web-automated
    restart: unless-stopped
    logging: *default-logging
    environment:
      TZ: $TZ
      PUID: 1000
      PGID: 1000
      HARDCOVER_TOKEN: $HARDCOVER_TOKEN
      # If your library is on a network share (e.g., NFS/SMB), disable WAL to reduce locking issues
      # Accepts: true/false (default: false)
      NETWORK_SHARE_MODE: false
      CWA_PORT_OVERRIDE: 8083
    volumes:
      - calibre-web-data:/config
      - type: volume
        source: calibre-data
        target: /calibre-library
        volume:
          subpath: books
    networks:
      - proxy

  karaoke-eternal:
    image: radrootllc/karaoke-eternal:latest
    container_name: karaoke-eternal
    restart: unless-stopped
    logging: *default-logging
    environment:
      TZ: $TZ
    volumes:
      - karaoke-eternal-data:/config
      - ${MEDIA_PATH}/karaoke:/mnt/karaoke
    networks:
      - proxy

  vaultwarden:
    image: ghcr.io/dani-garcia/vaultwarden:1.35.4
    container_name: vaultwarden
    restart: unless-stopped
    logging: *default-logging
    environment:
      TZ: $TZ
      DOMAIN: $DOMAIN
      SSO_AUTHORITY: $SSO_AUTHORITY
      SSO_CLIENT_ID: $SSO_CLIENT_ID
      SSO_CLIENT_SECRET: $SSO_CLIENT_SECRET
      SSO_ENABLED: true
      SSO_SCOPES: email profile offline_access
      SSO_ALLOW_UNKNOWN_EMAIL_VERIFICATION: false
      SSO_CLIENT_CACHE_EXPIRATION: 0
      SSO_ONLY: true
      SSO_SIGNUPS_MATCH_EMAIL: true
    extra_hosts:
      - auth.pauld.link:${INTERNAL_HOST_IP}
    volumes:
      - vaultwarden-data:/data
    networks:
      - proxy

  vikunja:
    image: ghcr.io/go-vikunja/vikunja:2.2.0
    container_name: vikunja
    restart: unless-stopped
    logging: *default-logging
    user: "0:0"
    environment:
      TZ: $TZ
      VIKUNJA_SERVICE_PUBLICURL: https://todo.pauld.link
      VIKUNJA_SERVICE_JWTSECRET: $VIK_SERVICE_JWT_SECRET
      VIKUNJA_DATABASE_TYPE: sqlite
      VIKUNJA_DATABASE_PATH: /app/vikunja/files/vikunja.db
      VIKUNJA_SERVICE_ENABLEREGISTRATION: false
      VIKUNJA_SERVICE_ENABLELINKSHARING: false
      VIKUNJA_AUTH_OPENID_ENABLED: true
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_NAME: Authentik
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_AUTHURL: $VIK_AUTHENTIK_URL
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_CLIENTID: $VIK_OIDC_CLIENT_ID
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_CLIENTSECRET: $VIK_OIDC_CLIENT_SECRET
    volumes:
      - vikunja-data:/app/vikunja/files
    networks:
      - proxy

  happier:
    image: happierdev/relay-server:dev
    container_name: happier
    restart: unless-stopped
    logging: *default-logging
    labels:
      docker-volume-backup.stop-during-backup: true
    environment:
      TZ: $TZ
      NODE_ENV: production
      PORT: 3005
      HAPPIER_PUBLIC_SERVER_URL: https://happier.pauld.link
      HAPPIER_WEBAPP_URL: https://happier.pauld.link
      HAPPIER_SERVER_TRUST_PROXY: "1"
      HANDY_MASTER_SECRET: $HAPPIER_HANDY_MASTER_SECRET
      HAPPIER_DB_PROVIDER: sqlite
      HAPPIER_FILES_BACKEND: local
      AUTH_ANONYMOUS_SIGNUP_ENABLED: false
      AUTH_SIGNUP_PROVIDERS: authentik
      AUTH_REQUIRED_LOGIN_PROVIDERS: authentik
      HAPPIER_FEATURE_AUTH_LOGIN__KEY_CHALLENGE_ENABLED: "0"
      HAPPIER_FEATURE_AUTH_UI__AUTO_REDIRECT_ENABLED: "1"
      HAPPIER_FEATURE_AUTH_UI__AUTO_REDIRECT_PROVIDER_ID: authentik
      AUTH_PROVIDERS_CONFIG_JSON: >-
        [{"id":"authentik","type":"oidc","displayName":"Authentik","issuer":"${HAPPIER_AUTHENTIK_ISSUER_URL}","clientId":"${HAPPIER_AUTHENTIK_CLIENT_ID}","clientSecret":"${HAPPIER_AUTHENTIK_CLIENT_SECRET}","redirectUrl":"https://happier.pauld.link/v1/oauth/authentik/callback","scopes":"openid profile email"}]
    volumes:
      - happier-data:/data
    networks:
      - proxy

volumes:
  audiobookshelf-data:
  calibre-data:
  calibre-web-data:
  happier-data:
  jellyfin-data:
  karaoke-eternal-data:
  vaultwarden-data:
  vikunja-data:
